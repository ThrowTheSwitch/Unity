# This file provides a base configuration for working with the gcc
# toolchain, targetting native compilation, using mostly default settings,
# with many warnings enabled for self-validation. It can be modified or 
# mixed to customize for your project needs.

---
:tools:
  :test_compiler:
    :name: compiler
    :executable: gcc
    :arguments:
    - "-c"
    - "-Wall"
    - "-Wno-address"
    - "-std=c99"
    - "-pedantic"
    - "-Wextra"
    - "-Werror"
    - "-Wpointer-arith"
    - "-Wcast-align"
    - "-Wwrite-strings"
    - "-Wswitch-default"
    - "-Wunreachable-code"
    - "-Winit-self"
    - "-Wmissing-field-initializers"
    - "-Wno-unknown-pragmas"
    - "-Wstrict-prototypes"
    - "-Wundef"
    - "-Wold-style-definition"
    - '-I"${5}"'
    - "-D${6}"
    - "${1}"
    - "-o ${2}"
  :test_linker:
    :name: linker
    :executable: gcc
    :arguments:
    - "${1}"
    - "-lm"
    - "-o ${2}"
:extension:
  :object: ".o"
  :executable: ".exe"
:defines:
  :test:
  - UNITY_INCLUDE_DOUBLE
  - UNITY_SUPPORT_TEST_CASES
  - UNITY_SUPPORT_64
  - UNITY_POINTER_WIDTH=64
